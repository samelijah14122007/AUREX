spring.application.name=aurex-backend

server.port=${SERVER_PORT:8080}

# ---------------------------------------------------------------------------
# Database
# Credentials are supplied by the deployment environment; do not commit them.
# ---------------------------------------------------------------------------
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.servlet.multipart.max-file-size=${MAX_UPLOAD_SIZE:20MB}
spring.servlet.multipart.max-request-size=${MAX_UPLOAD_SIZE:20MB}
app.storage.directory=${APP_STORAGE_DIRECTORY:uploads}

# Flyway is the sole schema owner. On a brand-new database it applies the
# migrations below; Hibernate only verifies the resulting schema.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-migration-naming=true
# Adopt the pre-Flyway local schema at V1; subsequent migrations remain authoritative.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# ---------------------------------------------------------------------------
# JWT
# ---------------------------------------------------------------------------
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ---------------------------------------------------------------------------
# CORS - comma separated list of allowed frontend origins.
# Vite's default dev server ports (5173/3000) are included out of the box.
# ---------------------------------------------------------------------------
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000}

# Optional local Banking Knowledge Engine provider. When unavailable AUREX
# automatically uses the embedded banking knowledge base; no cloud key is needed.
ollama.enabled=${OLLAMA_ENABLED:false}
ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
ollama.model=${OLLAMA_MODEL:llama3.2}
