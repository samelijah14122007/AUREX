spring.application.name=aurex-backend

# ==========================================
# SERVER
# ==========================================
server.port=${SERVER_PORT:8080}

# ==========================================
# DATABASE (Neon PostgreSQL)
# ==========================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# FILE UPLOAD
# ==========================================
spring.servlet.multipart.max-file-size=${MAX_UPLOAD_SIZE:20MB}
spring.servlet.multipart.max-request-size=${MAX_UPLOAD_SIZE:20MB}
app.storage.directory=${APP_STORAGE_DIRECTORY:uploads}

# ==========================================
# FLYWAY
# ==========================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-migration-naming=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# ==========================================
# JWT
# ==========================================
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ==========================================
# CORS
# ==========================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000}

# ==========================================
# OLLAMA (Local AI)
# ==========================================
ollama.enabled=${OLLAMA_ENABLED:false}
ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
ollama.model=${OLLAMA_MODEL:llama3.2}
